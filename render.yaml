services:
  - type: worker
    name: ruxxys-shorts-bot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FORCE_JOIN_CHANNEL
        value: "@Ruxxys"
      - key: CHANNEL_URL
        value: "https://t.me/Ruxxys"
      - key: MAX_SHORT_DURATION
        value: "60"
